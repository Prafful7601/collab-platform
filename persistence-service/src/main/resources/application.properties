spring.application.name=persistence-service

spring.datasource.url=jdbc:postgresql://localhost:5432/collabdb?TimeZone=UTC
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.TimeZone=UTC
jakarta.persistence.jdbc.url=jdbc:postgresql://localhost:5432/collabdb?TimeZone=UTC
jakarta.persistence.jdbc.user=admin
jakarta.persistence.jdbc.password=admin
jakarta.persistence.jdbc.driver=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=localhost:9092